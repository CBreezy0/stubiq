services:
  postgres:
    image: postgres:16
    container_name: mlb-show-intel-postgres
    environment:
      POSTGRES_DB: mlb_show_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/mlb_show_intel
      GAME_YEAR: 26
      AUTO_CREATE_SCHEMA: "false"
      AUTO_SEED_DEV_DATA: "false"
      SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
